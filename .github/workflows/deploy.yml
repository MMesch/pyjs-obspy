name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install micromamba
      uses: mamba-org/setup-micromamba@v1
      with:
        micromamba-version: 'latest'
        init-shell: bash
    
    - name: Create build environment and run build
      run: |
        # Create and activate the build environment
        micromamba create -f .github/build-environment.yml -n build-env
        # Activate the environment and run the build script
        micromamba run -n build-env bash -c "
          if [ -f build.sh ]; then
            chmod +x build.sh
            ./build.sh
          else
            echo 'No build.sh found, skipping build'
          fi
        "
      shell: bash -l {0}
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: built-files
        path: |
          pyjs_runtime_browser.js
          pyjs_runtime_browser.wasm
          empack_env_meta.json
          packages/
    
  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
    - uses: actions/checkout@v4
      
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: built-files
        path: ./

    - name: Setup Pages
      uses: actions/configure-pages@v4

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
