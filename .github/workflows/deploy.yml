name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install micromamba
      uses: mamba-org/setup-micromamba@v1
      with:
        micromamba-version: 'latest'
        init-shell: bash
    
    - name: Create build environment
      run: |
        micromamba create -f .github/build-environment.yml -n build-env
        micromamba activate build-env
      shell: bash -l {0}
    
    - name: Build environment
      run: |
        # Run the build script
        if [ -f build.sh ]; then
          chmod +x build.sh
          ./build.sh
        else
          echo "No build.sh found, skipping build"
        fi
      shell: bash -l {0}  # Use login shell to get micromamba in PATH
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: built-files
        path: |
          pyjs_runtime_browser.js
          pyjs_runtime_browser.wasm
          empack_env_meta.json
          packages/
    
  deploy:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        name: built-files
        path: ./
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./
        enable_jekyll: false
        allow_empty_commit: false
